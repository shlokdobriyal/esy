name: Two-way Cross-Account Sync

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync Primary to Secondary
        if: github.repository == 'shlokdobriyal/esy'
        env:
          # Double check if your secret is named DESTINATION_PAT or SECONDARY_ACCOUNT_PAT
          SECONDARY_PAT: ${{ secrets.SECONDARY_ACCOUNT_PAT }}
        run: |
          git config --global user.name "Sync Bot"
          git config --global user.email "sync-bot@example.com"
          
          # The repository URL is securely hardcoded here to prevent 'No host' errors
          git remote add target https://x-access-token:${SECONDARY_PAT}@://github.com 2>/dev/null || git remote set-url target https://x-access-token:${SECONDARY_PAT}@://github.com
          
          git fetch target main
          git merge target/main --no-edit
          git push target main

      - name: Sync Secondary to Primary
        if: github.repository == 'ishuD26/esy'
        env:
          PRIMARY_PAT: ${{ secrets.PRIMARY_ACCOUNT_PAT }}
        run: |
          git config --global user.name "Sync Bot"
          git config --global user.email "sync-bot@example.com"
          
          git remote add target https://x-access-token:${PRIMARY_PAT}@://github.com 2>/dev/null || git remote set-url target https://x-access-token:${PRIMARY_PAT}@://github.com
          
          git fetch target main
          git merge target/main --no-edit
          git push target main
