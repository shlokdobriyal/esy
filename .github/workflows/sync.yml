name: Two-Way Cross-Account Sync

on:
  push:
    branches:
      - main

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "Sync Bot"
          git config --global user.email "sync-bot@example.com"

      - name: Verify Secret Exists
        env:
          TOKEN: ${{ github.repository == 'shlokdobriyal/esy' && secrets.DESTINATION_PAT || secrets.PRIMARY_ACCOUNT_PAT }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "TOKEN IS EMPTY"
            exit 1
          else
            echo "TOKEN FOUND"
          fi

      - name: Sync shlokdobriyal -> ishuD26
        if: github.repository == 'shlokdobriyal/esy'
        env:
          TOKEN: ${{ secrets.DESTINATION_PAT }}
        run: |
          git remote add target https://x-access-token:${TOKEN}@github.com/ishuD26/esy.git || true
          git remote set-url target https://x-access-token:${TOKEN}@github.com/ishuD26/esy.git
          git push --mirror target

      - name: Sync ishuD26 -> shlokdobriyal
        if: github.repository == 'ishuD26/esy'
        env:
          TOKEN: ${{ secrets.PRIMARY_ACCOUNT_PAT }}
        run: |
          git remote add target https://x-access-token:${TOKEN}@github.com/shlokdobriyal/esy.git || true
          git remote set-url target https://x-access-token:${TOKEN}@github.com/shlokdobriyal/esy.git
          git push --mirror target
