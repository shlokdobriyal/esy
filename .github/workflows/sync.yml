name: Cross-Account Sync to ishuD26

on:
  push:
    branches:
      - '**' 
  tags:
    - '**'   

jobs:
  mirror:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Primary Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # This line prevents the default bot token from overriding your PAT
          persist-credentials: false 

      - name: Mirror to Secondary Account
        env:
          DESTINATION_REPO: "github.com/ishuD26/esy.git"
          DESTINATION_PAT: ${{ secrets.DESTINATION_PAT }}
        run: |
          git remote add mirror https://x-access-token:${DESTINATION_PAT}@${DESTINATION_REPO} 2>/dev/null || git remote set-url mirror https://x-access-token:${DESTINATION_PAT}@${DESTINATION_REPO}
          
          git push mirror --prune --force --all
          git push mirror --prune --force --tags
